<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelapi - Manajemen Nomor & OTP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #6c63ff;
            font-size: 2.5rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a4a;
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: #6c63ff;
            box-shadow: 0 0 20px rgba(108, 99, 255, 0.1);
        }
        .card h3 {
            color: #6c63ff;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        .card-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card-content button {
            background: #6c63ff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .card-content button:hover {
            background: #5a52d5;
            transform: translateY(-2px);
        }
        .card-content button:active {
            transform: translateY(0);
        }
        .card-content button.secondary {
            background: #2a2a4a;
        }
        .card-content button.secondary:hover {
            background: #3a3a5a;
        }
        .card-content button.danger {
            background: #ff4757;
        }
        .card-content button.danger:hover {
            background: #ff3344;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 10px 0;
        }
        .input-group label {
            font-size: 0.9rem;
            color: #aaa;
        }
        .input-group input, .input-group select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2a2a4a;
            background: #0f0f1a;
            color: #fff;
            font-size: 1rem;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #6c63ff;
        }
        .response-box {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .response-box.success {
            border-color: #00d2d3;
        }
        .response-box.error {
            border-color: #ff4757;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-badge.success {
            background: #00d2d3;
            color: #0f0f1a;
        }
        .status-badge.error {
            background: #ff4757;
            color: #fff;
        }
        .status-badge.info {
            background: #6c63ff;
            color: #fff;
        }
        .mt-10 { margin-top: 10px; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .flex-center { align-items: center; }
        .gap-10 { gap: 10px; }
        .w-full { width: 100%; }
        .text-center { text-align: center; }
        .text-muted { color: #aaa; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Zelapi Manager</h1>
        
        <!-- Stats & Info -->
        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
            <div class="card">
                <h3>📊 Status</h3>
                <div class="card-content">
                    <div id="apiStatus" class="status-badge info">Checking...</div>
                    <div id="apiKeyDisplay" class="text-muted">Key: zelapi-4hwd4va</div>
                </div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="grid">
            <!-- Card 1: Countries -->
            <div class="card">
                <h3>🌍 Daftar Negara</h3>
                <div class="card-content">
                    <button onclick="getCountries()">📥 Ambil Daftar Negara</button>
                    <div id="countriesResponse" class="response-box">Belum ada data</div>
                </div>
            </div>

            <!-- Card 2: My Numbers -->
            <div class="card">
                <h3>📱 Nomor Saya</h3>
                <div class="card-content">
                    <button onclick="getMyNumbers()">📥 Ambil Nomor Saya</button>
                    <div id="myNumbersResponse" class="response-box">Belum ada data</div>
                </div>
            </div>

            <!-- Card 3: Request Number -->
            <div class="card">
                <h3>📞 Request Nomor</h3>
                <div class="card-content">
                    <div class="input-group">
                        <label>Service</label>
                        <select id="requestService">
                            <option value="WhatsApp">WhatsApp</option>
                            <option value="Telegram">Telegram</option>
                            <option value="Gmail">Gmail</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Country</label>
                        <select id="requestCountry">
                            <option value="Indonesia">Indonesia</option>
                            <option value="United States">United States</option>
                            <option value="United Kingdom">United Kingdom</option>
                            <option value="India">India</option>
                        </select>
                    </div>
                    <button onclick="requestNumber()">📨 Request Nomor</button>
                    <div id="requestResponse" class="response-box">Belum ada data</div>
                </div>
            </div>

            <!-- Card 4: Release Number -->
            <div class="card">
                <h3>🗑️ Release Nomor</h3>
                <div class="card-content">
                    <div class="input-group">
                        <label>Nomor (contoh: 6288269202428)</label>
                        <input type="text" id="releaseNumberInput" placeholder="6288269202428">
                    </div>
                    <button class="danger" onclick="releaseNumber()">🗑️ Release Nomor</button>
                    <div id="releaseResponse" class="response-box">Belum ada data</div>
                </div>
            </div>

            <!-- Card 5: Latest OTP -->
            <div class="card">
                <h3>🔑 Latest OTP</h3>
                <div class="card-content">
                    <div class="input-group">
                        <label>Nomor (contoh: 6288269202428)</label>
                        <input type="text" id="otpNumberInput" placeholder="6288269202428">
                    </div>
                    <button onclick="getLatestOTP()">🔍 Ambil OTP Terbaru</button>
                    <div id="latestOTPResponse" class="response-box">Belum ada data</div>
                </div>
            </div>

            <!-- Card 6: My OTPs -->
            <div class="card">
                <h3>📜 Riwayat OTP</h3>
                <div class="card-content">
                    <div class="input-group">
                        <label>Limit (default: 10)</label>
                        <input type="number" id="otpLimitInput" value="10" min="1" max="100">
                    </div>
                    <button onclick="getMyOTPs()">📜 Ambil Riwayat OTP</button>
                    <div id="myOTPsResponse" class="response-box">Belum ada data</div>
                </div>
            </div>
        </div>

        <!-- Global Response Log -->
        <div class="card">
            <h3>📋 Log Aktifitas</h3>
            <div class="card-content">
                <button onclick="clearLog()" class="secondary">🧹 Clear Log</button>
                <div id="globalLog" class="response-box" style="max-height: 200px;">Log akan muncul di sini...</div>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const API_KEY = 'zelapi-4hwd4va';
        const BASE_URL = 'https://api.zelapioffciall.dpdns.org/api/v1/nokos';

        // ========== HELPER FUNCTIONS ==========
        async function apiCall(endpoint, method = 'GET', body = null) {
            const options = {
                method: method,
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                }
            };
            if (body) {
                options.body = JSON.stringify(body);
            }

            try {
                const response = await fetch(`${BASE_URL}${endpoint}`, options);
                const data = await response.json();
                return { success: true, data, status: response.status };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        function displayResponse(elementId, data, isSuccess = true) {
            const element = document.getElementById(elementId);
            element.textContent = JSON.stringify(data, null, 2);
            element.className = `response-box ${isSuccess ? 'success' : 'error'}`;
        }

        function logToGlobal(message, isError = false) {
            const log = document.getElementById('globalLog');
            const timestamp = new Date().toLocaleTimeString();
            const entry = `[${timestamp}] ${message}\n`;
            log.textContent = entry + log.textContent;
            if (isError) {
                log.className = 'response-box error';
            } else {
                log.className = 'response-box success';
            }
        }

        function clearLog() {
            document.getElementById('globalLog').textContent = 'Log akan muncul di sini...';
            document.getElementById('globalLog').className = 'response-box';
        }

        // ========== API FUNCTIONS ==========

        // 1. Get Countries
        async function getCountries() {
            logToGlobal('🌍 Mengambil daftar negara...');
            const result = await apiCall('/countries?service=WhatsApp');
            if (result.success) {
                displayResponse('countriesResponse', result.data);
                logToGlobal(`✅ Berhasil mengambil ${result.data.countries?.length || 0} negara`);
            } else {
                displayResponse('countriesResponse', { error: result.error }, false);
                logToGlobal(`❌ Gagal mengambil negara: ${result.error}`, true);
            }
        }

        // 2. Get My Numbers
        async function getMyNumbers() {
            logToGlobal('📱 Mengambil daftar nomor saya...');
            const result = await apiCall('/my_numbers');
            if (result.success) {
                displayResponse('myNumbersResponse', result.data);
                logToGlobal(`✅ Berhasil mengambil ${result.data.numbers?.length || 0} nomor`);
            } else {
                displayResponse('myNumbersResponse', { error: result.error }, false);
                logToGlobal(`❌ Gagal mengambil nomor: ${result.error}`, true);
            }
        }

        // 3. Request Number
        async function requestNumber() {
            const service = document.getElementById('requestService').value;
            const country = document.getElementById('requestCountry').value;
            
            logToGlobal(`📨 Request nomor untuk ${service} di ${country}...`);
            
            const result = await apiCall('/request_number', 'POST', {
                service: service,
                country: country
            });
            
            if (result.success) {
                displayResponse('requestResponse', result.data);
                logToGlobal(`✅ Berhasil request nomor: ${result.data.number || 'N/A'}`);
            } else {
                displayResponse('requestResponse', { error: result.error }, false);
                logToGlobal(`❌ Gagal request nomor: ${result.error}`, true);
            }
        }

        // 4. Release Number
        async function releaseNumber() {
            const number = document.getElementById('releaseNumberInput').value.trim();
            if (!number) {
                alert('Masukkan nomor yang akan di-release!');
                return;
            }
            
            logToGlobal(`🗑️ Me-release nomor ${number}...`);
            
            const result = await apiCall('/release_number', 'POST', {
                number: number
            });
            
            if (result.success) {
                displayResponse('releaseResponse', result.data);
                logToGlobal(`✅ Berhasil release nomor ${number}`);
            } else {
                displayResponse('releaseResponse', { error: result.error }, false);
                logToGlobal(`❌ Gagal release nomor: ${result.error}`, true);
            }
        }

        // 5. Latest OTP
        async function getLatestOTP() {
            const number = document.getElementById('otpNumberInput').value.trim();
            if (!number) {
                alert('Masukkan nomor untuk cek OTP!');
                return;
            }
            
            logToGlobal(`🔍 Mengambil OTP terbaru untuk ${number}...`);
            
            const result = await apiCall(`/latest_otp?number=${encodeURIComponent(number)}`);
            
            if (result.success) {
                displayResponse('latestOTPResponse', result.data);
                if (result.data.has_otp) {
                    logToGlobal(`✅ OTP ditemukan: ${result.data.otp_code || 'N/A'}`);
                } else {
                    logToGlobal(`ℹ️ Belum ada OTP untuk ${number}`);
                }
            } else {
                displayResponse('latestOTPResponse', { error: result.error }, false);
                logToGlobal(`❌ Gagal mengambil OTP: ${result.error}`, true);
            }
        }

        // 6. My OTPs
        async function getMyOTPs() {
            const limit = document.getElementById('otpLimitInput').value || 10;
            
            logToGlobal(`📜 Mengambil riwayat OTP (limit: ${limit})...`);
            
            const result = await apiCall(`/my_otps?limit=${limit}`);
            
            if (result.success) {
                displayResponse('myOTPsResponse', result.data);
                logToGlobal(`✅ Berhasil mengambil ${result.data.otps?.length || 0} riwayat OTP`);
            } else {
                displayResponse('myOTPsResponse', { error: result.error }, false);
                logToGlobal(`❌ Gagal mengambil riwayat OTP: ${result.error}`, true);
            }
        }

        // ========== INIT ==========
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('apiStatus').textContent = '🟢 Online';
            document.getElementById('apiStatus').className = 'status-badge success';
            logToGlobal('🚀 Aplikasi siap!');
            logToGlobal(`🔑 API Key: ${API_KEY}`);
            
            // Auto load initial data
            setTimeout(() => {
                getCountries();
                getMyNumbers();
            }, 500);
        });

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active.id === 'releaseNumberInput') releaseNumber();
                if (active.id === 'otpNumberInput') getLatestOTP();
                if (active.id === 'otpLimitInput') getMyOTPs();
            }
        });
    </script>
</body>
</html>
